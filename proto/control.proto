syntax = "proto3";

package drop.control;

import "hotmethod.proto";
import "common.proto";

// ============================================================
// Control 服务 —— API Server 调用 drop_server 的入口
//
// 这是 apiserver → drop_server 的管理接口
// ============================================================

service Control {
  // 创建采集任务
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);

  // 拉取 Agent 采集的原始数据
  rpc FetchData(FetchDataRequest) returns (FetchDataResponse);

  // 查询 Agent 统计信息
  rpc StatAgent(StatAgentRequest) returns (StatAgentResponse);

  // 列出所有已注册的 Agent
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
}

message CreateTaskRequest {
  string target_ip              = 1;   // 目标 Agent IP
  string service                = 2;   // 服务名: "hotmethod"
  drop.hotmethod.TaskDesc task_desc = 3;
}

message CreateTaskResponse {
  string task_id = 1;   // 创建成功的任务 ID
  string error   = 2;   // 错误信息（空 = 成功）
}

message FetchDataRequest {
  string task_id = 1;
  string file_key= 2;   // 要拉取的文件 key
}

message FetchDataResponse {
  bytes  data    = 1;
  string error   = 2;
}

message StatAgentRequest {
  string target_ip = 1;
}

message StatAgentResponse {
  drop.common.PidStats agent_stats     = 1;
  repeated drop.common.PidStats child_stats = 2;
  bool   is_online                     = 3;
  string error                         = 4;
}

message ListAgentsRequest {}

message AgentInfo {
  string uid              = 1;
  string hostname         = 2;
  string ip_addr          = 3;
  string agent_version    = 4;
  bool   is_online        = 5;
  string last_heartbeat   = 6;   // ISO 8601 时间戳
}

message ListAgentsResponse {
  repeated AgentInfo agents = 1;
}
